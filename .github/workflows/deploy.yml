name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-demo .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devops-demo
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
           docker pull ${{ secrets.DOCKER_USERNAME }}/devops-demo
           # Stop ANY container using port 3000
            docker ps -q --filter "publish=3000" | xargs -r docker stop

            # Remove ANY container using port 3000
            docker ps -aq --filter "publish=3000" | xargs -r docker rm

            # Remove old image (optional but clean)
            docker rmi ${{ secrets.DOCKER_USERNAME }}/devops-demo || true

            # Pull latest again (force fresh)
            docker pull ${{ secrets.DOCKER_USERNAME }}/devops-demo

            # Run new container
            docker run -d -p 3000:3000 --name devops-container ${{ secrets.DOCKER_USERNAME }}/devops-demo